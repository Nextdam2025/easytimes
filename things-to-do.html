<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Easy Times • Things to Do</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600&display=swap" rel="stylesheet"/>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      height:100vh;
      width:100vw;
      overflow:hidden;
      background:#000;
      color:#fef5e6;
      font-family:'Barlow Condensed',sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    /* Background Video */
    video.bg-video{
      position:fixed;
      top:50%;
      left:50%;
      min-width:100%;
      height:100%;
      transform:translate(-50%,-50%);
      object-fit:cover;
      opacity:.25;
      z-index:-1;
    }

    /* Orange Frame */
    .orange-frame{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      border:10px solid #f26522;
      pointer-events:none;
      z-index:10000;
    }

    /* Floating Logo */
    @keyframes floatLogo{
      to{
        transform:translateY(-8px);
      }
    }

    .logo{
      animation:floatLogo 2s ease-in-out infinite alternate;
      margin:1rem 0;
    }

    .logo h1{
      font-size:3rem;
      letter-spacing:.1em;
    }

    .logo h2{
      font-size:1.25rem;
      color:#f26522;
      margin-top:.2em;
    }

    /* Back Button */
    .back-btn{
      margin:1rem 0;
    }

    .back-btn button{
      padding:10px 20px;
      font-size:1rem;
      border-radius:10px;
      background:rgba(255,255,255,.1);
      border:none;
      color:#fff;
      cursor:pointer;
    }

    /* Grid */
    .partners-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:1rem;
      width:100%;
      max-width:1200px;
      padding:0 1rem 2rem;
      overflow-y:auto;
      flex:1;
    }

    .partner-card{
      background:#111;
      border:2px solid #f26522;
      border-radius:16px;
      padding:1rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      transition:.3s;
    }

    .partner-card:hover{
      transform:scale(1.03);
      border-color:#ffb347;
    }

    .partner-card img{
      width:120px;
      height:120px;
      object-fit:contain;
      background:rgba(255,255,255,.05);
      border-radius:12px;
      padding:10px;
      margin-bottom:.75rem;
    }

    .partner-card h3{
      font-size:1.5rem;
      margin-bottom:.5rem;
      color:#fff;
    }

    .partner-card p{
      font-size:1rem;
      line-height:1.4;
      color:#ddd;
      margin-bottom:1rem;
    }

    .partner-action{
      margin-top:auto;
      width:100%;
      padding:.75rem;
      border:none;
      border-radius:10px;
      background:#f26522;
      color:#000;
      font-weight:bold;
      font-size:1rem;
      cursor:pointer;
    }

    .partner-action:hover{
      background:#ff8c3a;
    }

    /* Scrollbar */
    .partners-grid::-webkit-scrollbar{
      width:8px;
    }

    .partners-grid::-webkit-scrollbar-thumb{
      background:#f26522;
      border-radius:10px;
    }

    /* Popup */
    .popup{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#111;
      border:3px solid #f26522;
      border-radius:15px;
      padding:25px;
      width:90%;
      max-width:500px;
      z-index:20000;
      display:none;
    }

    .popup h3{
      color:#f26522;
      margin-bottom:10px;
    }

    .popup p{
      line-height:1.5;
      margin-bottom:15px;
    }

    .popup button{
      padding:10px 20px;
      background:#f26522;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="smoke.mp4" type="video/mp4"/>
  </video>

  <div class="orange-frame"></div>

  <div class="back-btn">
    <button onclick="history.back()">⬅ Back</button>
  </div>

  <div class="logo">
    <h1>EASY TIMES</h1>
    <h2>Things To Do In Amsterdam</h2>
  </div>

  <div class="partners-grid" id="partnersGrid"></div>

  <div class="popup" id="popup">
    <h3>Easy Times Recommendation</h3>
    <p id="popupText"></p>
    <button onclick="closePopup()">Close</button>
  </div>

<script>
/* Optional tracking only */
const STORAGE_KEY = "easy_cid";

function getCid() {
  let cid = localStorage.getItem(STORAGE_KEY);

  if (!cid) {
    cid = Math.random().toString(36).substring(2,10);
    localStorage.setItem(STORAGE_KEY,cid);
  }

  return cid;
}

const CID = getCid();

/* Partners */
const partners = [
  {
    id:"abike",
    name:"A-Bike Rentals",
    logo:"images/abike-logo.png",
    text:"Discover Amsterdam by bike. One of the most popular ways to explore the city.",
    popup:"Ask our staff downstairs for special bike rental recommendations."
  },
  {
    id:"hashmuseum",
    name:"Hash & Marijuana Museum",
    logo:"images/hashmuseum-logo.png",
    text:"Learn about the fascinating history of cannabis culture.",
    popup:"Located in the city centre. Ask staff for directions."
  },
  {
    id:"canal",
    name:"Canal Cruise",
    logo:"images/canal-cruise.png",
    text:"Experience Amsterdam from the water with a classic canal cruise.",
    popup:"Canal cruises depart throughout the day."
  },
  {
    id:"heineken",
    name:"Heineken Experience",
    logo:"images/heineken.png",
    text:"Visit one of Amsterdam's most famous attractions.",
    popup:"Tickets available online and nearby."
  },
  {
    id:"rijksmuseum",
    name:"Rijksmuseum",
    logo:"images/rijksmuseum.png",
    text:"See masterpieces from Dutch history and art.",
    popup:"One of the top museums in the Netherlands."
  },
  {
    id:"annefrank",
    name:"Anne Frank House",
    logo:"images/annefrank.png",
    text:"A powerful historical experience.",
    popup:"Advance booking is strongly recommended."
  }
];

const grid = document.getElementById("partnersGrid");

partners.forEach(partner => {

  const card = document.createElement("div");
  card.className = "partner-card";

  card.innerHTML = `
    <img src="${partner.logo}" alt="${partner.name}">
    <h3>${partner.name}</h3>
    <p>${partner.text}</p>
    <button class="partner-action">More Info</button>
  `;

  card.onclick = () => {

    /* Optional click tracking */
    navigator.sendBeacon?.(
      "/api/affiliate_click",
      JSON.stringify({
        partner: partner.id,
        cid: CID,
        timestamp: Date.now()
      })
    );

    document.getElementById("popupText").innerText = partner.popup;
    document.getElementById("popup").style.display = "block";
  };

  grid.appendChild(card);
});

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
